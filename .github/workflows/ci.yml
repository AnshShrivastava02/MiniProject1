name: CI
on: push
jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v7.0.0
      - name: Set Up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install dependencies
        run : npm ci
      - name: Run tests
        run: npm test
